<svg width="260" height="260" viewBox="0 0 260 260"
     xmlns="http://www.w3.org/2000/svg">

  <!-- 背景：淡い青白 -->
  <rect x="0" y="0" width="260" height="260" fill="#F7FBFF"/>

  <!-- 中心座標 -->
  <!-- cx = 130, cy = 130 -->

  <!-- R-layer 同心円（部分的に開いた円弧） -->
  <!-- 最外層 -->
  <circle cx="130" cy="130" r="90"
          fill="none"
          stroke="#A7D4FF"
          stroke-width="1.2"
          stroke-opacity="0.25"
          stroke-dasharray="440 80"
          stroke-dashoffset="70"/>

  <!-- 第3層 -->
  <circle cx="130" cy="130" r="70"
          fill="none"
          stroke="#8FC5FF"
          stroke-width="1.1"
          stroke-opacity="0.40"
          stroke-dasharray="340 60"
          stroke-dashoffset="55"/>

  <!-- 第2層 -->
  <circle cx="130" cy="130" r="50"
          fill="none"
          stroke="#7FBFFF"
          stroke-width="1.0"
          stroke-opacity="0.60"
          stroke-dasharray="250 40"
          stroke-dashoffset="40"/>

  <!-- 最内層 -->
  <circle cx="130" cy="130" r="30"
          fill="none"
          stroke="#6AB0FF"
          stroke-width="0.9"
          stroke-opacity="0.80"
          stroke-dasharray="160 30"
          stroke-dashoffset="25"/>

  <!-- 中心の情報核（少しオフセット） -->
  <circle cx="126" cy="134" r="3.0"
          fill="#FFFFFF"
          stroke="#6AB0FF"
          stroke-width="0.6"
          stroke-opacity="0.9"/>

  <!-- ノード（高次元情報構造の点） -->
  <!-- 最内層ノード -->
  <circle cx="154" cy="118" r="2.2" fill="#FFFFFF" stroke="#6AB0FF" stroke-width="0.4" stroke-opacity="0.9"/>
  <circle cx="114" cy="104" r="2.2" fill="#FFFFFF" stroke="#6AB0FF" stroke-width="0.4" stroke-opacity="0.9"/>

  <!-- 第2層ノード -->
  <circle cx="171" cy="141" r="2.4" fill="#FFFFFF" stroke="#7FBFFF" stroke-width="0.4" stroke-opacity="0.9"/>
  <circle cx="104" cy="162" r="2.4" fill="#FFFFFF" stroke="#7FBFFF" stroke-width="0.4" stroke-opacity="0.9"/>

  <!-- 第3層ノード -->
  <circle cx="186" cy="104" r="2.6" fill="#FFFFFF" stroke="#8FC5FF" stroke-width="0.4" stroke-opacity="0.9"/>
  <circle cx="79"  cy="136" r="2.6" fill="#FFFFFF" stroke="#8FC5FF" stroke-width="0.4" stroke-opacity="0.9"/>

  <!-- 最外層ノード -->
  <circle cx="201" cy="161" r="2.8" fill="#FFFFFF" stroke="#A7D4FF" stroke-width="0.4" stroke-opacity="0.9"/>
  <circle cx="69"  cy="96"  r="2.8" fill="#FFFFFF" stroke="#A7D4FF" stroke-width="0.4" stroke-opacity="0.9"/>

  <!-- ノード間の曲線（情報の流れ） -->
  <!-- 中心核 → 最内層ノード -->
  <path d="M126 134 C 138 128, 146 124, 154 118"
        fill="none"
        stroke="#6AB0FF"
        stroke-width="0.7"
        stroke-opacity="0.55"/>

  <!-- 層をまたぐ結合 -->
  <path d="M154 118 C 166 120, 178 115, 186 104"
        fill="none"
        stroke="#7FBFFF"
        stroke-width="0.6"
        stroke-opacity="0.50"/>

  <path d="M114 104 C 100 114, 88 124, 79 136"
        fill="none"
        stroke="#7FBFFF"
        stroke-width="0.6"
        stroke-opacity="0.50"/>

  <path d="M171 141 C 184 146, 194 152, 201 161"
        fill="none"
        stroke="#8FC5FF"
        stroke-width="0.6"
        stroke-opacity="0.50"/>

  <path d="M104 162 C 94 152, 82 132, 69 96"
        fill="none"
        stroke="#8FC5FF"
        stroke-width="0.6"
        stroke-opacity="0.50"/>

  <!-- 同一層内の結合 -->
  <path d="M186 104 C 178 115, 176 130, 171 141"
        fill="none"
        stroke="#A7D4FF"
        stroke-width="0.5"
        stroke-opacity="0.45"/>

  <path d="M79 136 C 90 146, 98 155, 104 162"
        fill="none"
        stroke="#A7D4FF"
        stroke-width="0.5"
        stroke-opacity="0.45"/>

</svg>
